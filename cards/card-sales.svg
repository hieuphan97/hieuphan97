<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-sales" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent-sales" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#f7931e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="240" rx="12" fill="url(#bg-sales)"/>
  <!-- Top accent border -->
  <rect width="600" height="4" rx="2" fill="url(#accent-sales)"/>
  <!-- Left accent line -->
  <rect x="0" y="0" width="4" height="240" rx="2" fill="url(#accent-sales)"/>

  <!-- Repo icon -->
  <rect x="28" y="28" width="16" height="16" rx="2" fill="#ff6b35" opacity="0.9"/>
  <line x1="32" y1="33" x2="32" y2="39" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="35" y1="33" x2="35" y2="39" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="38" y1="33" x2="38" y2="39" stroke="#1a1a2e" stroke-width="1.5"/>

  <!-- Title -->
  <text x="52" y="41" font-family="'Courier New', monospace" font-size="15" font-weight="700" fill="#ff6b35">Retail Sales Performance Analytics</text>

  <!-- Divider -->
  <line x1="28" y1="58" x2="572" y2="58" stroke="#ff6b35" stroke-width="0.5" opacity="0.3"/>

  <!-- Description -->
  <text x="28" y="85" font-family="'Courier New', monospace" font-size="12" fill="#c8c8d4" opacity="0.85">Sales Performance Dashboard | Analyzing global revenue,</text>
  <text x="28" y="103" font-family="'Courier New', monospace" font-size="12" fill="#c8c8d4" opacity="0.85">profit &amp; market trends across 4 strategic views:</text>
  <text x="28" y="121" font-family="'Courier New', monospace" font-size="12" fill="#c8c8d4" opacity="0.85">Overview, Market, Product, Report.</text>

  <!-- Bottom section -->
  <line x1="28" y1="185" x2="572" y2="185" stroke="#ff6b35" stroke-width="0.5" opacity="0.2"/>

  <!-- Language dot -->
  <circle cx="36" cy="207" r="7" fill="#f7c948"/>
  <text x="50" y="212" font-family="'Courier New', monospace" font-size="12" fill="#8b8ba7">Power BI</text>
</svg>
