  <text x="28" y="121" font-family="'Courier New', monospace" font-size="12" fill="#c8c8d4" opacity="0.85">into meaningful segments.</text>

  <line x1="28" y1="185" x2="572" y2="185" stroke="#ff6b35" stroke-width="0.5" opacity="0.2"/>
  <circle cx="36" cy="207" r="7" fill="#f7931e"/>
  <text x="50" y="212" font-family="'Courier New', monospace" font-size="12" fill="#8b8ba7">Jupyter Notebook</text>

