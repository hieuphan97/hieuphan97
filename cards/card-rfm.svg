      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent-rfm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#f7931e"/>
    </linearGradient>
  </defs>

  <rect width="600" height="240" rx="12" fill="url(#bg-rfm)"/>
  <rect width="600" height="4" rx="2" fill="url(#accent-rfm)"/>
  <rect x="0" y="0" width="4" height="240" rx="2" fill="url(#accent-rfm)"/>

  <rect x="28" y="28" width="16" height="16" rx="2" fill="#ff6b35" opacity="0.9"/>
  <line x1="32" y1="33" x2="32" y2="39" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="35" y1="33" x2="35" y2="39" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="38" y1="33" x2="38" y2="39" stroke="#1a1a2e" stroke-width="1.5"/>

  <text x="52" y="41" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="#ff6b35">E-commerce Customer Segmentation &amp; RFM Analysis</text>

  <line x1="28" y1="58" x2="572" y2="58" stroke="#ff6b35" stroke-width="0.5" opacity="0.3"/>

  <text x="28" y="85" font-family="'Courier New', monospace" font-size="12" fill="#c8c8d4" opacity="0.85">Applies the RFM (Recency-Frequency-Monetary) model to a</text>
